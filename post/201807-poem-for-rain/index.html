    <h1 class="article-title">观暴雨淹城有感</h1>

    
    <span class="article-date">July 5, 2018</span>
    

    <div class="article-content">
      <p>七月初，连日阴雨致城区部分路段积水，网传短片显示行车困难，警报四响。
地下排水系统想必是满载了。与老友闲聊时，有感而发，即兴写一简诗，
以抒胸志，后稍加修改，完成此篇鄙作。</p>
